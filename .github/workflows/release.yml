name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  goreleaser:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5 # v5.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6 # v5.5.0
        with:
          go-version: "1.26"
          check-latest: true

      # Added Node + PNPM via Corepack
      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm --version
          
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # If you have a frontend build step, it should go here
      # - name: Build frontend
      #   run: pnpm build

      - run: go tool goreleaser release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CC: gcc
          CXX: g++

      - name: Upload dist
        uses: actions/upload-artifact@v4 # v4.6.2
        with:
          name: dist
          path: dist