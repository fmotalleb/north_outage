name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5 # v5.0.0

      - uses: actions/setup-go@v5 # v5.5.0
        with:
          go-version: "1.26"
          check-latest: true
      # Added Node + PNPM via Corepack
      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm --version
      - name: Build
        run: make ci
      # - name: Upload coverage
      #   uses: actions/upload-artifact@v4 # v4.6.2
      #   with:
      #     name: coverage-${{ matrix.os }}
      #     path: coverage.*

      - run: go tool goreleaser release --clean --snapshot
        if: ${{ runner.os == 'Linux' }}

      - name: Upload dist
        uses: actions/upload-artifact@v4 # v4.6.2
        with:
          name: dist-${{ matrix.os }}
          path: dist

      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v5 # v5.4.3
      #   with:
      #     fail_ci_if_error: true
      #     files: ./coverage.out
      #     token: ${{ secrets.CODECOV_TOKEN }}
